<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Telegram Mini-App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to MCP Telegram Mini-App</h1>
        <a href="tg://resolve?domain=your_bot_username&start=launch" class="button">Launch Token</a>
        <a href="tg://resolve?domain=your_bot_username&start=trust" class="button">Deploy Trust</a>
        <a href="tg://resolve?domain=your_bot_username&start=reserves" class="button">View Reserves</a>
    </div>
</body>
</html>
