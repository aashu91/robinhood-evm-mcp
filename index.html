<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Telegram Mini-App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            background-color: #007bff;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MCP Telegram Mini-App</h1>
        <button onclick="sendMessage('/launch')">Launch Token</button>
        <button onclick="sendMessage('/trust')">Deploy Trust</button>
        <button onclick="sendMessage('/reserves')">View Reserves</button>

        <script>
            function sendMessage(command) {
                window.Telegram.WebApp.sendData(JSON.stringify({ command: command }));
            }

            window.Telegram.WebApp.ready();
        </script>
    </div>
</body>
</html>
